<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>

<title>Quiz Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f8;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

main{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

/* FORM */

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 18px;
border:none;
background:#111;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#333;
}

/* CATEGORY GRID */

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.category{
background:#eee;
padding:20px;
border-radius:8px;
cursor:pointer;
text-align:center;
font-weight:bold;
}

.category:hover{
background:#ddd;
}

/* QUIZ */

.options button{
display:block;
width:100%;
margin:8px 0;
background:#eee;
color:#000;
}

.correct{
background:#27ae60 !important;
color:white;
}

.wrong{
background:#e74c3c !important;
color:white;
}

/* MOBILE */

@media(max-width:600px){

.categories{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<header>

<h1>Quiz Hub</h1>
<p>Test your knowledge in multiple categories</p>

</header>

<main>
  <section id="authSection" class="card">

<h2>Start Quiz</h2>

<button id="googleLogin">Sign in with Google</button>

<br><br>

<button onclick="playGuest()">Play as Guest</button>

</section>

<!-- LOGIN / SIGNUP -->

<section id="authSection" class="card">

<h2>Sign In</h2>

<input id="loginUser" placeholder="Username">

<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Sign In</button>
<button onclick="logout()">Logout</button>

<hr style="margin:20px 0">

<h2>Sign Up</h2>

<input id="signupUser" placeholder="Username">

<input id="signupPass" type="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

<hr style="margin:20px 0">

<button onclick="playGuest()">Play as Guest</button>

</section>


<!-- CATEGORY PAGE -->

<section id="categorySection" class="card" style="display:none">

<h2>Select Quiz Category</h2>

<div class="categories">

<div class="category" onclick="startCategory('general')">
General Knowledge
</div>

<div class="category" onclick="startCategory('animals')">
Animals
</div>

<div class="category" onclick="startCategory('flags')">
Country Flags
</div>

</div>

</section>


<!-- QUIZ AREA -->

<section id="quizSection" class="card" style="display:none">

<h2 id="question"></h2>

<div class="options" id="options"></div>

<button onclick="nextQuestion()">Next</button>

</section>


<!-- SCORE -->

<section id="scoreSection" class="card" style="display:none">

<h2 id="scoreText"></h2>

<button onclick="location.reload()">Play Again</button>

</section>

</main>


<script>

/* USERS STORAGE */

function signup(){

let user = document.getElementById("signupUser").value
let pass = document.getElementById("signupPass").value

let users =
JSON.parse(localStorage.getItem("quizUsers")) || []

users.push({user,pass})

localStorage.setItem("quizUsers",JSON.stringify(users))

alert("Account created")

}

function login(){

let user = document.getElementById("loginUser").value
let pass = document.getElementById("loginPass").value

let users =
JSON.parse(localStorage.getItem("quizUsers")) || []

let found = users.find(u=>u.user===user && u.pass===pass)

if(found){

localStorage.setItem("quizCurrentUser",user)

startCategories()

}else{

alert("Invalid login")

}

}

function playGuest(){

localStorage.setItem("quizCurrentUser","Guest")

startCategories()

}

function startCategories(){

document.getElementById("authSection").style.display="none"
document.getElementById("categorySection").style.display="block"

}

/* QUIZ DATA */

const quizzes = {

general:[
{
question:"What is the capital of France?",
options:["Paris","London","Rome"],
answer:"Paris"
},
{
question:"2 + 2 = ?",
options:["3","4","5"],
answer:"4"
}
],

animals:[
{
question:"Which animal is the king of the jungle?",
options:["Lion","Tiger","Elephant"],
answer:"Lion"
},
{
question:"Which animal can fly?",
options:["Dog","Eagle","Cat"],
answer:"Eagle"
}
],

flags:[
{
question:"Which country has a maple leaf flag?",
options:["Canada","USA","UK"],
answer:"Canada"
},
{
question:"Green white green flag belongs to?",
options:["Nigeria","Italy","India"],
answer:"Nigeria"
}
]

}

/* QUIZ LOGIC */

let currentQuiz=[]
let currentQuestion=0
let score=0

function startCategory(cat){

currentQuiz = quizzes[cat]

document.getElementById("categorySection").style.display="none"
document.getElementById("quizSection").style.display="block"

loadQuestion()

}

function loadQuestion(){

let q = currentQuiz[currentQuestion]

document.getElementById("question").textContent=q.question

let optionsHTML=""

q.options.forEach(option=>{

optionsHTML+=
`<button onclick="selectAnswer(this,'${option}')">${option}</button>`

})

document.getElementById("options").innerHTML=optionsHTML

}

function selectAnswer(btn,option){

let correct=currentQuiz[currentQuestion].answer

let buttons=document.querySelectorAll(".options button")

buttons.forEach(b=>b.disabled=true)

if(option===correct){

btn.classList.add("correct")

score++

}else{

btn.classList.add("wrong")

buttons.forEach(b=>{
if(b.textContent===correct){
b.classList.add("correct")
}
})

}

}

function nextQuestion(){

currentQuestion++

if(currentQuestion < currentQuiz.length){

loadQuestion()

}else{

finishQuiz()

}

}

function finishQuiz(){

document.getElementById("quizSection").style.display="none"

document.getElementById("scoreSection").style.display="block"

let user =
localStorage.getItem("quizCurrentUser")

document.getElementById("scoreText").innerHTML =
`${user}, your score is ${score}/${currentQuiz.length}`

}

const firebaseConfig = {
apiKey: "AIzaSyBT2lJAmVk0DSeeCqGCFmNHWYij_o0aOWU",
authDomain: "quiz-1691e.firebaseapp.com",
projectId: "quiz-1691e",
appId: "1:827524171077:web:e0d319b3c321c62fcc2a2c",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();

const provider = new firebase.auth.GoogleAuthProvider();

document.getElementById("googleLogin")
.addEventListener("click", function(){

auth.signInWithPopup(provider)
.then((result)=>{

const user = result.user;

localStorage.setItem("quizUserName", user.displayName);
localStorage.setItem("quizUserEmail", user.email);
localStorage.setItem("quizUserPhoto", user.photoURL);

startCategories();

})
.catch((error)=>{
console.log(error);
});

});

function playGuest(){

localStorage.setItem("quizUserName","Guest");

startCategories();

}

firebase.auth().onAuthStateChanged((user)=>{

if(user){

localStorage.setItem("quizUserName", user.displayName);

startCategories();

}

});

const username = localStorage.getItem("quizUserName");

document.getElementById("welcomeUser").textContent =
"Welcome " + username;

function logout(){

firebase.auth().signOut();

localStorage.clear();

location.reload();

}

</script>

</body>

</html>
