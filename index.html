<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate Quiz Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f8;
color:#333;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

main{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

/* CATEGORY GRID */

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.category{
background:#eee;
padding:20px;
border-radius:8px;
text-align:center;
cursor:pointer;
font-weight:bold;
}

.category:hover{
background:#ddd;
}

/* QUIZ HEADER */

.quiz-header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-weight:bold;
}

.timer{
color:#e74c3c;
}

/* PROGRESS BAR */

.progress-bar{
height:10px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-bottom:15px;
}

.progress{
height:100%;
width:0%;
background:#27ae60;
}

/* OPTIONS */

.options button{
display:block;
width:100%;
margin:8px 0;
padding:12px;
border:none;
background:#eee;
border-radius:6px;
cursor:pointer;
}

.correct{
background:#2ecc71 !important;
color:white;
}

.wrong{
background:#e74c3c !important;
color:white;
}

.next-btn{
margin-top:10px;
padding:12px 18px;
background:#111;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* LEADERBOARD */

.leaderboard ul{
list-style:none;
}

.leaderboard li{
padding:6px 0;
border-bottom:1px solid #eee;
}

/* MOBILE */

@media(max-width:600px){

.categories{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<header>

<h1>Ultimate Quiz Hub</h1>
<p>Challenge your knowledge</p>

</header>

<main>

<!-- CATEGORY -->

<section id="categorySection" class="card">

<h2>Select Quiz Category</h2>

<div class="categories">

<div class="category" onclick="startCategory('general')">General Knowledge</div>

<div class="category" onclick="startCategory('animals')">Animals</div>

<div class="category" onclick="startCategory('flags')">Country Flags</div>

</div>

</section>


<!-- QUIZ -->

<section id="quizSection" class="card" style="display:none">

<div class="progress-bar">
<div id="progress" class="progress"></div>
</div>

<div class="quiz-header">

<span id="questionNumber"></span>

<span class="timer">Time: <span id="timer">15</span>s</span>

</div>

<h2 id="question"></h2>

<div id="options" class="options"></div>

<button class="next-btn" onclick="nextQuestion()">Next</button>

</section>


<!-- SCORE -->

<section id="scoreSection" class="card" style="display:none">

<h2 id="scoreText"></h2>

<button onclick="restartQuiz()">Play Again</button>

</section>


<!-- LEADERBOARD -->

<section class="card leaderboard">

<h2>Leaderboard</h2>

<ul id="leaderboardList"></ul>

</section>

</main>


<script>

/* QUIZ DATA */

const quizzes = {

general:[
{question:"Capital of France?",options:["Paris","Rome","Madrid"],answer:"Paris"},
{question:"2+5=?",options:["6","7","8"],answer:"7"},
{question:"Largest ocean?",options:["Pacific","Atlantic","Indian"],answer:"Pacific"},
{question:"How many continents?",options:["5","6","7"],answer:"7"},
{question:"Telephone inventor?",options:["Bell","Edison","Tesla"],answer:"Bell"},
{question:"Closest planet to sun?",options:["Mercury","Venus","Earth"],answer:"Mercury"},
{question:"Gas humans breathe?",options:["Oxygen","Hydrogen","Carbon"],answer:"Oxygen"},
{question:"H2O is?",options:["Water","Salt","Oxygen"],answer:"Water"},
{question:"Largest land animal?",options:["Elephant","Lion","Horse"],answer:"Elephant"},
{question:"Sun is a?",options:["Star","Planet","Moon"],answer:"Star"}
],

animals:[
{question:"King of jungle?",options:["Lion","Tiger","Bear"],answer:"Lion"},
{question:"Fastest land animal?",options:["Cheetah","Horse","Dog"],answer:"Cheetah"},
{question:"Animal that barks?",options:["Dog","Cat","Cow"],answer:"Dog"},
{question:"Largest animal?",options:["Blue Whale","Elephant","Shark"],answer:"Blue Whale"},
{question:"Long neck animal?",options:["Giraffe","Horse","Zebra"],answer:"Giraffe"},
{question:"Bird that can't fly?",options:["Ostrich","Eagle","Parrot"],answer:"Ostrich"},
{question:"Animal that hops?",options:["Kangaroo","Dog","Horse"],answer:"Kangaroo"},
{question:"Animal with shell?",options:["Turtle","Dog","Cat"],answer:"Turtle"},
{question:"Largest cat?",options:["Tiger","Lion","Leopard"],answer:"Tiger"},
{question:"Water animal?",options:["Fish","Dog","Cat"],answer:"Fish"}
],

flags:[
{question:"Maple leaf flag?",options:["Canada","USA","UK"],answer:"Canada"},
{question:"Green white green?",options:["Nigeria","Italy","India"],answer:"Nigeria"},
{question:"Stars and stripes?",options:["USA","France","Brazil"],answer:"USA"},
{question:"Red circle flag?",options:["Japan","China","Korea"],answer:"Japan"},
{question:"Union Jack?",options:["UK","USA","Australia"],answer:"UK"},
{question:"Blue yellow flag?",options:["Sweden","Germany","Italy"],answer:"Sweden"},
{question:"Cedar tree flag?",options:["Lebanon","Iran","Turkey"],answer:"Lebanon"},
{question:"Yellow star red?",options:["Vietnam","China","Japan"],answer:"Vietnam"},
{question:"Green white red vertical?",options:["Italy","Ireland","Mexico"],answer:"Italy"},
{question:"Flag with map?",options:["Cyprus","France","Spain"],answer:"Cyprus"}
]

}

/* STATE */

let category = localStorage.getItem("quizCategory")
let currentQuestion = Number(localStorage.getItem("quizQuestion")) || 0
let score = Number(localStorage.getItem("quizScore")) || 0

let currentQuiz=[]
let timer
let timeLeft=15

/* START CATEGORY */

function startCategory(cat){

category=cat

localStorage.setItem("quizCategory",cat)

currentQuiz = [...quizzes[cat]].sort(()=>Math.random()-0.5)

document.getElementById("categorySection").style.display="none"
document.getElementById("quizSection").style.display="block"

loadQuestion()

}

/* LOAD QUESTION */

function loadQuestion(){

clearInterval(timer)

timeLeft=15

document.getElementById("timer").textContent=timeLeft

timer=setInterval(()=>{

timeLeft--

document.getElementById("timer").textContent=timeLeft

if(timeLeft===0){

clearInterval(timer)

nextQuestion()

}

},1000)

let q=currentQuiz[currentQuestion]

document.getElementById("question").textContent=q.question

document.getElementById("questionNumber").textContent =
`Question ${currentQuestion+1}/${currentQuiz.length}`

document.getElementById("progress").style.width =
((currentQuestion)/currentQuiz.length)*100+"%"

let html=""

q.options.forEach(option=>{

html+=`<button onclick="selectAnswer(this,'${option}')">${option}</button>`

})

document.getElementById("options").innerHTML=html

}

/* SELECT */

function selectAnswer(btn,option){

clearInterval(timer)

let correct=currentQuiz[currentQuestion].answer

let buttons=document.querySelectorAll(".options button")

buttons.forEach(b=>b.disabled=true)

if(option===correct){

btn.classList.add("correct")

score++

localStorage.setItem("quizScore",score)

}else{

btn.classList.add("wrong")

buttons.forEach(b=>{
if(b.textContent===correct){
b.classList.add("correct")
}
})

}

}

/* NEXT */

function nextQuestion(){

currentQuestion++

localStorage.setItem("quizQuestion",currentQuestion)

if(currentQuestion < currentQuiz.length){

loadQuestion()

}else{

finishQuiz()

}

}

/* FINISH */

function finishQuiz(){

document.getElementById("quizSection").style.display="none"

document.getElementById("scoreSection").style.display="block"

document.getElementById("scoreText").innerHTML =
`Your Score: ${score}/${currentQuiz.length}`

saveLeaderboard(score)

localStorage.clear()

}

/* LEADERBOARD */

function saveLeaderboard(score){

let board =
JSON.parse(localStorage.getItem("leaderboard")) || []

board.push(score)

board.sort((a,b)=>b-a)

board = board.slice(0,5)

localStorage.setItem("leaderboard",JSON.stringify(board))

loadLeaderboard()

}

function loadLeaderboard(){

let board =
JSON.parse(localStorage.getItem("leaderboard")) || []

let html=""

board.forEach((s,i)=>{

html+=`<li>#${i+1} — ${s} pts</li>`

})

document.getElementById("leaderboardList").innerHTML=html

}

loadLeaderboard()

function restartQuiz(){

location.reload()

}

</script>

</body>
</html>
